<!DOCTYPE html>
<html>
<head><title>Favicon Options</title>
<style>
  body { font-family: Inter, sans-serif; background: #faf9f7; padding: 40px; display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .option { text-align: center; }
  .option img { width: 64px; height: 64px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .option .small { width: 32px; height: 32px; border-radius: 7px; margin-top: 8px; }
  .option .tiny { width: 16px; height: 16px; border-radius: 4px; margin-top: 4px; }
  .option p { margin-top: 8px; font-size: 13px; color: #666; }
</style>
</head>
<body>
  <div class="option"><img src="1-hanger.svg"><br><img class="small" src="1-hanger.svg"><img class="tiny" src="1-hanger.svg"><p>1. Hanger</p></div>
  <div class="option"><img src="2-tshirt.svg"><br><img class="small" src="2-tshirt.svg"><img class="tiny" src="2-tshirt.svg"><p>2. T-Shirt</p></div>
  <div class="option"><img src="3-dice.svg"><br><img class="small" src="3-dice.svg"><img class="tiny" src="3-dice.svg"><p>3. Dice</p></div>
  <div class="option"><img src="4-sparkle-s.svg"><br><img class="small" src="4-sparkle-s.svg"><img class="tiny" src="4-sparkle-s.svg"><p>4. Sparkle S</p></div>
  <div class="option"><img src="5-bold-s.svg"><br><img class="small" src="5-bold-s.svg"><img class="tiny" src="5-bold-s.svg"><p>5. Bold S</p></div>
  <div class="option"><img src="6-cream-s.svg"><br><img class="small" src="6-cream-s.svg"><img class="tiny" src="6-cream-s.svg"><p>6. Cream S</p></div>
  <div class="option"><img src="7-circle-s.svg"><br><img class="small" src="7-circle-s.svg"><img class="tiny" src="7-circle-s.svg"><p>7. Circle S</p></div>
  <div class="option"><img src="8-sunglasses.svg"><br><img class="small" src="8-sunglasses.svg"><img class="tiny" src="8-sunglasses.svg"><p>8. Sunglasses</p></div>
  <div class="option"><img src="9-high-heel.svg"><br><img class="small" src="9-high-heel.svg"><img class="tiny" src="9-high-heel.svg"><p>9. High Heel</p></div>
  <div class="option"><img src="10-shopping-bag.svg"><br><img class="small" src="10-shopping-bag.svg"><img class="tiny" src="10-shopping-bag.svg"><p>10. Shopping Bag</p></div>
  <div class="option"><img src="11-dress.svg"><br><img class="small" src="11-dress.svg"><img class="tiny" src="11-dress.svg"><p>11. Dress</p></div>
  <div class="option"><img src="12-star.svg"><br><img class="small" src="12-star.svg"><img class="tiny" src="12-star.svg"><p>12. Star</p></div>
</body>
</html>
